name: 🚀 Novaa Launcher CI/CD

on:
  push:
    branches:
      - master
      - 'release/**'
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to run'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

# Cancel previous runs on same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:

  # ============================================================
  #  JOB 1: Code Quality (Lint + Static Analysis)
  # ============================================================
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git blame in lint reports

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔍 Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: 📊 Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 7

  # ============================================================
  #  JOB 2: Unit Tests
  # ============================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: 📊 Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && hashFiles('app/build/test-results/testDebugUnitTest/*.xml') != ''
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit

      - name: 📊 Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/test-results/
            app/build/reports/tests/
          retention-days: 7

  # ============================================================
  #  JOB 3: Build Debug APK
  # ============================================================
  build-debug:
    name: 🏗️ Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📋 Get APK info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "✅ Debug APK built: $APK_PATH ($APK_SIZE)"

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ============================================================
  #  JOB 4: Build Release APK (signed)
  #  Runs only on: push to main, release/** branches, or version tags
  # ============================================================
  build-release:
    name: 📦 Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/release/') ||
       startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🔑 Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/novaa-release-key.jks
          echo "✅ Keystore decoded"

      - name: 🏗️ Build & Sign Release APK
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=novaa-release-key.jks \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --stacktrace

      - name: 🔒 Cleanup Keystore
        if: always()
        run: rm -f app/novaa-release-key.jks

      - name: 🏷️ Rename APK with version
        run: |
          VERSION=$(grep versionName app/build.gradle | awk -F'"' '{print $2}')
          BUILD=$(grep versionCode app/build.gradle | awk '{print $NF}')
          COMMIT=${GITHUB_SHA::7}
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_DEST="app/build/outputs/apk/release/NovaaLauncher-v${VERSION}-${BUILD}-${COMMIT}-release.apk"
          mv "$APK_SRC" "$APK_DEST"
          echo "APK_PATH=$APK_DEST" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ Renamed to: $APK_DEST"

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/NovaaLauncher-*.apk
          retention-days: 30

  # ============================================================
  #  JOB 5: GitHub Release (only on version tags)
  # ============================================================
  github-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-debug, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: release-artifacts/

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Novaa Launcher ${{ github.ref_name }}"
          body: |
            ## 🚀 Novaa Launcher ${{ github.ref_name }}

            ### 📋 What's Changed
            ${{ env.CHANGELOG }}

            ### 📦 Download
            Install the APK below directly on your Android device (minSdk 26 / Android 8.0+).

            ### ℹ️ How to install
            1. Download `NovaaLauncher-*.apk`
            2. Enable "Install from unknown sources" in Settings
            3. Install APK
            4. Press Home → select **Novaa Launcher** → Always

            ---
            Built with ❤️ by GitHub Actions · Commit `${{ github.sha }}`
          files: release-artifacts/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false
