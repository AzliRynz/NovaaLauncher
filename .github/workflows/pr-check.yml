name: 🔎 Pull Request Check

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:

  # ============================================================
  #  PR TITLE CHECK — enforce Conventional Commits format
  # ============================================================
  pr-title:
    name: 📝 Check PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ✅ Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            PR title must start with a capital letter.
            Example: "feat: Add drag and drop for home icons"

  # ============================================================
  #  CHANGED FILES ANALYSIS
  # ============================================================
  analyze-changes:
    name: 🔬 Analyze Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_java: ${{ steps.changes.outputs.java }}
      has_xml:  ${{ steps.changes.outputs.xml }}
      has_gradle: ${{ steps.changes.outputs.gradle }}

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            java:
              - '**/*.java'
              - '**/*.kt'
            xml:
              - '**/*.xml'
            gradle:
              - '**/*.gradle'
              - '**/gradle-wrapper.properties'

  # ============================================================
  #  QUICK LINT (only if Java/XML changed)
  # ============================================================
  quick-lint:
    name: 🔍 Quick Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze-changes
    if: needs.analyze-changes.outputs.has_java == 'true' || needs.analyze-changes.outputs.has_xml == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: 🔍 Lint
        run: ./gradlew lintDebug --stacktrace

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pr-lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 3

  # ============================================================
  #  BUILD CHECK (compile only — fast feedback)
  # ============================================================
  build-check:
    name: 🏗️ Build Check (compile)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze-changes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: 🏗️ Compile Debug
        run: ./gradlew compileDebugJavaWithJavac --stacktrace

      - name: 🧪 Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pr-test-results
          path: app/build/test-results/
          retention-days: 3

  # ============================================================
  #  APK SIZE CHECK — fail if APK grows too much
  # ============================================================
  apk-size-check:
    name: 📏 APK Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-check
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug

      - name: 📏 Check APK Size
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_MB = $SIZE_BYTES / 1048576" | bc || echo $(( SIZE_BYTES / 1048576 )))
          MAX_MB=15

          echo "📦 APK Size: ${SIZE_BYTES} bytes (~${SIZE_MB} MB)"
          echo "📏 Max allowed: ${MAX_MB} MB"

          if [ "$SIZE_BYTES" -gt $(( MAX_MB * 1048576 )) ]; then
            echo "❌ APK is too large! ${SIZE_MB}MB > ${MAX_MB}MB limit"
            exit 1
          else
            echo "✅ APK size OK"
          fi

      - name: 💬 Comment APK size on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const apkPath = execSync('find app/build/outputs/apk/debug -name "*.apk" | head -1').toString().trim();
            const size = execSync(`stat -c%s "${apkPath}"`).toString().trim();
            const sizeMB = (parseInt(size) / 1048576).toFixed(2);

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📦 APK Size Report\n\n| Metric | Value |\n|---|---|\n| Debug APK Size | \`${sizeMB} MB\` |\n| Raw Bytes | \`${size}\` |\n| Limit | \`15 MB\` |\n\n${parseInt(sizeMB) < 15 ? '✅ Size OK' : '❌ Too large!'}`
            });

  # ============================================================
  #  PR SUMMARY COMMENT
  # ============================================================
  pr-summary:
    name: 💬 PR Summary
    runs-on: ubuntu-latest
    needs: [pr-title, quick-lint, build-check]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: 💬 Post PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const lint   = '${{ needs.quick-lint.result }}';
            const build  = '${{ needs.build-check.result }}';
            const title  = '${{ needs.pr-title.result }}';

            const status = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const body = `## 🔎 PR Check Summary

            | Check | Status |
            |---|---|
            | PR Title Format | ${status(title)} |
            | Lint | ${status(lint)} |
            | Build & Tests | ${status(build)} |

            ${build === 'success' && lint !== 'failure' ? '### ✅ All checks passed! Ready for review.' : '### ❌ Some checks failed. Please fix before merging.'}
            `;

            // Find existing bot comment and update, or create new
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('PR Check Summary'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
