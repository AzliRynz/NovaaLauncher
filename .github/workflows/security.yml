name: 🛡️ Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:

  # ============================================================
  #  CODEQL STATIC ANALYSIS
  # ============================================================
  codeql:
    name: 🔐 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔐 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-and-quality

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🏗️ Build for CodeQL
        run: ./gradlew compileDebugJavaWithJavac --stacktrace

      - name: 🔐 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java

  # ============================================================
  #  DEPENDENCY VULNERABILITY SCAN
  # ============================================================
  dependency-scan:
    name: 🔍 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - run: chmod +x ./gradlew

      - name: 🔍 OWASP Dependency Check
        run: |
          ./gradlew dependencyCheckAnalyze --stacktrace || true

      - name: 📤 Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-vulnerability-report
          path: build/reports/dependency-check-report.html
          retention-days: 30

  # ============================================================
  #  SECRET SCANNING (check for hardcoded secrets)
  # ============================================================
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
