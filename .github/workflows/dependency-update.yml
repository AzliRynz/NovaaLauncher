name: 🔄 Dependency Updates

on:
  schedule:
    # Every Monday at 08:00 UTC (15:00 WIB)
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:

  # ============================================================
  #  CHECK OUTDATED GRADLE DEPENDENCIES
  # ============================================================
  check-dependencies:
    name: 🔍 Check Dependency Versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - run: chmod +x ./gradlew

      - name: 🔍 Check for outdated dependencies
        run: |
          ./gradlew dependencyUpdates \
            -Drevision=release \
            --stacktrace 2>&1 | tee dependency-report.txt || true

      - name: 📤 Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-report
          path: |
            dependency-report.txt
            build/dependencyUpdates/
          retention-days: 14

      - name: 💬 Comment dependency report on latest PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('dependency-report.txt', 'utf8');
              // Extract only the outdated section
              const match = report.match(/The following dependencies have later .+?(?=\n\n|\Z)/s);
              report = match ? match[0] : 'No outdated dependencies found! ✅';
            } catch (e) {
              report = 'Could not read dependency report.';
            }

            // Truncate if too long for a comment
            if (report.length > 3000) report = report.substring(0, 3000) + '\n...(truncated)';

            console.log('Dependency Report:\n' + report);

  # ============================================================
  #  GRADLE WRAPPER UPDATE CHECK
  # ============================================================
  check-gradle-wrapper:
    name: 🔧 Check Gradle Wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: ✅ Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3
