name: 🌙 Nightly Build

on:
  schedule:
    # Every day at 02:00 UTC (09:00 WIB)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      notify_slack:
        description: 'Send Slack notification'
        type: boolean
        default: true

env:
  JAVA_VERSION: '17'

jobs:

  # ============================================================
  #  NIGHTLY DEBUG BUILD
  # ============================================================
  nightly-build:
    name: 🌙 Nightly Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop   # always build from develop branch

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x ./gradlew

      - name: 🧪 Run Full Test Suite
        run: ./gradlew testDebugUnitTest lintDebug --stacktrace

      - name: 🏗️ Build Nightly APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🏷️ Rename with date + commit
        run: |
          DATE=$(date +'%Y%m%d')
          COMMIT=${GITHUB_SHA::7}
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          DEST="app/build/outputs/apk/debug/NovaaLauncher-nightly-${DATE}-${COMMIT}.apk"
          mv "$APK" "$DEST"
          echo "NIGHTLY_APK=$DEST" >> $GITHUB_ENV

      - name: 📤 Upload Nightly APK
        uses: actions/upload-artifact@v7
        with:
          name: nightly-${{ github.run_number }}
          path: app/build/outputs/apk/debug/NovaaLauncher-nightly-*.apk
          retention-days: 7   # auto-delete after 1 week

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nightly-test-results-${{ github.run_number }}
          path: |
            app/build/test-results/
            app/build/reports/
          retention-days: 7

      - name: 💬 Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🌙 Nightly Build Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly build failed!\n\n**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n**Branch:** develop\n**Commit:** ${{ github.sha }}\n\nPlease investigate.`,
              labels: ['bug', 'ci-failure']
            });
